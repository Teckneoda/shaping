services:
  # MongoDB - Shared database for both services
  mongodb:
    image: mongo:5.0
    container_name: integration-test-mongodb
    ports:
      - "27017:27017"
    volumes:
      # Mount seed scripts
      - ./test-data:/docker-entrypoint-initdb.d:ro
      # Persist data (optional - comment out for ephemeral tests)
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=classifieds_test
    networks:
      - integration-test-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CAPI - Legacy PHP/Symfony Service
  capi:
    build:
      context: ../../../Research Repos/Legacy/m-ksl-classifieds-api
      dockerfile: Dockerfile
    container_name: integration-test-capi
    ports:
      - "8081:8080"
    environment:
      - APP_ENV=test
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DATABASE=classifieds_test
      - PHP_MEMORY_LIMIT=512M
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - integration-test-network
    volumes:
      # Mount CAPI code for development
      - ../../../Research Repos/Legacy/m-ksl-classifieds-api:/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # listing-http-rest - New Go Service
  listing-http-rest:
    build:
      context: ../../../Research Repos/marketplace-backend
      dockerfile: apps/listing/services/listing-http-rest/Dockerfile
    container_name: integration-test-listing-rest
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - PROJECT_ID=ddm-platform-test
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DATABASE=classifieds_test
      - CAPI_URL=http://capi:8080
      - LOG_LEVEL=debug
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - integration-test-network
    volumes:
      # Mount Go code for development
      - ../../../Research Repos/marketplace-backend:/workspace:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  integration-test-network:
    driver: bridge
    name: integration-test-network

volumes:
  mongodb_data:
    name: integration-test-mongodb-data
